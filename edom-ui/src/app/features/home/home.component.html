    <p>Sistema di gestione sanitaria eDom</p>
  </div>

  <div class="stats-grid">
    <p-card header="Pazienti" styleClass="stat-card">
      <div class="stat-content">
        <i class="pi pi-users stat-icon"></i>
        <span class="stat-label">Gestione anagrafica pazienti</span>
      </div>

    <p-card header="Medici" styleClass="stat-card">

    </p-card>

    <p-card header="Prestazioni" styleClass="stat-card">
