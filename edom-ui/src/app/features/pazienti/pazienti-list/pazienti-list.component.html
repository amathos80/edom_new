<p-toast />

<p-card>
  <ng-template #header>
    <div class="card-header-row">
      <h2 class="card-title">Pazienti</h2>
    </div>
  </ng-template>

  <!-- Filtri -->
  <div class="filters-row">
    <p-iconfield>
      <p-inputicon class="pi pi-user" />
      <input
        pInputText
        placeholder="Cognome..."
        [(ngModel)]="filter.cognome"
        (keydown.enter)="search()"
      />
    </p-iconfield>

    <p-iconfield>
      <p-inputicon class="pi pi-id-card" />
      <input
        pInputText
        placeholder="Codice Fiscale..."
        [(ngModel)]="filter.codiceFiscale"
        (keydown.enter)="search()"
        class="uppercase-input"
      />
    </p-iconfield>

    <p-button label="Cerca" icon="pi pi-search" (onClick)="search()" />
    <p-button label="Reset" icon="pi pi-refresh" severity="secondary" [text]="true" (onClick)="reset()" />
  </div>

  <!-- Tabella -->
  <p-table
    [value]="pazienti()"
    [loading]="loading()"
    [paginator]="true"
    [rows]="20"
    [rowsPerPageOptions]="[10, 20, 50]"
    [sortMode]="'multiple'"
    stripedRows
    styleClass="p-datatable-sm"
  >
    <ng-template #header>
      <tr>
        <th pSortableColumn="cognome">Cognome <p-sortIcon field="cognome" /></th>
        <th pSortableColumn="nome">Nome <p-sortIcon field="nome" /></th>
        <th>Cod. Fiscale</th>
        <th pSortableColumn="dataNascita">Nato il <p-sortIcon field="dataNascita" /></th>
        <th>Sesso</th>
        <th>Stato</th>
        <th></th>
      </tr>
    </ng-template>

    <ng-template #body let-p>
      <tr>
        <td>{{ p.cognome }}</td>
        <td>{{ p.nome }}</td>
        <td><code>{{ p.codiceFiscale }}</code></td>
        <td>{{ p.dataNascita | date:'dd/MM/yyyy' }}</td>
        <td>{{ p.sesso }}</td>
        <td>
          <p-tag
            [value]="p.attivo ? 'Attivo' : 'Disattivo'"
            [severity]="p.attivo ? 'success' : 'danger'"
          />
        </td>
        <td class="actions-cell">
          <p-button icon="pi pi-pencil" [text]="true" severity="info" pTooltip="Modifica" />
          <p-button icon="pi pi-trash" [text]="true" severity="danger" pTooltip="Elimina" (onClick)="delete(p)" />
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="7" class="text-center p-4">Nessun paziente trovato.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
