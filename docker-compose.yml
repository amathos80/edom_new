services:
  postgres:
    image: postgres:16-alpine
    container_name: edom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - edom-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edom"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  edom-pgdata:
    driver: local
